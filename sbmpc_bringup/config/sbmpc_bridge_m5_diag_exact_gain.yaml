sbmpc_lfc_bridge_node:
  ros__parameters:
    sensor_topic: /sensor
    control_topic: /control
    diagnostics_topic: /sbmpc/diagnostics
    publish_rate_hz: 33.333333333333336
    planner_deadline_sec: 0.03
    enable_nonzero_control: false
    force_zero_control: false
    allow_joint_reordering: false
    retime_control_initial_state: true
    control_initial_state_prediction_sec: 0.0
    planner_phase: PREGRASP
    planner_gains: true
    planner_num_steps: 1
    planner_num_samples: 1024
    planner_horizon: 8
    planner_num_parallel_computations: 1024
    planner_num_control_points: 8
    planner_temperature: 0.05
    planner_dt: 0.03
    planner_lambda_mpc: 0.05
    planner_noise_scale: 0.05
    planner_std_dev_scale: 0.05
    planner_smoothing: Spline
    # KEY DIFFERENCE: exact uses the JAX differentiated rollout path instead of
    # finite-differencing the first MPPI action.
    planner_gain_method: exact
    planner_gain_fd_epsilon: 0.001
    planner_gain_fd_scheme: forward
    joint_names:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7
