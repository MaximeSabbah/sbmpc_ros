sbmpc_lfc_bridge_node:
  ros__parameters:
    sensor_topic: /sensor
    control_topic: /control
    diagnostics_topic: /sbmpc/diagnostics
    publish_rate_hz: 50.0
    planner_deadline_sec: 0.02
    enable_nonzero_control: false
    force_zero_control: false
    allow_joint_reordering: false
    planner_phase: PREGRASP
    # planner_gains: false => K=0 (pure feedforward), same as feedforward config.
    # Use this config ONLY to confirm zero-gain is stable as a sanity check.
    # Compare result to sbmpc_bridge_milestone5_feedforward.yaml.
    planner_gains: false
    planner_num_samples: 0
    planner_horizon: 0
    planner_num_parallel_computations: 0
    planner_num_control_points: 0
    planner_temperature: 0.0
    planner_dt: 0.0
    planner_lambda_mpc: 0.0
    planner_noise_scale: 0.0
    planner_std_dev_scale: 0.0
    planner_smoothing: Spline
    planner_gain_method: finite_difference
    planner_gain_fd_epsilon: 0.001
    planner_gain_fd_scheme: forward
    joint_names:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7
