sbmpc_lfc_bridge_node:
  ros__parameters:
    sensor_topic: /sensor
    control_topic: /control
    diagnostics_topic: /sbmpc/diagnostics
    # Keep the publish rate aligned with the hydrax control period
    # (task dt = 0.04 s -> 25 Hz).
    publish_rate_hz: 25.0
    planner_impl: hydrax
    planner_mode: feedforward # exact_feedback arrives with port plan Phase 4
    planner_warmup_iterations: 3
    # Transport and deployment wiring ONLY. The OCP tuning (cost weights,
    # solver knobs, plan timing) lives exclusively in hydrax's single
    # tuning surface: hydrax/configs/pregrasp.yaml — the same file the
    # Tier A gates certify. Nothing here can override it.
    #
    # Optional feedforward-mode-only diagonal LFC helper on top of the
    # planner's published gains. Keep disabled: the hydrax feedforward mode
    # already publishes the constant joint impedance (per-joint kp/kd from
    # the task options) through K.
    feedforward_position_gain: 0.0
    feedforward_velocity_damping_gain: 0.0
    # Rollout markers are toggled by the launch arg publish_rollout_markers:=true
    # (RViz MPPI debug); the keys below only style them when enabled. hydrax
    # already traces the gripper path of every rollout, so capture is free.
    rollout_marker_topic: /sbmpc/trajectory_markers
    rollout_marker_frame_id: base
    # Draw the zero-noise nominal plus the lowest-cost sampled rollouts.
    rollout_marker_max_samples: 16
    rollout_marker_publish_rate_hz: 5.0
    rollout_marker_line_width: 0.01
    rollout_marker_sample_line_width: 0.004
    rollout_marker_point_diameter: 0.025
    rollout_marker_goal_diameter: 0.045
    joint_names:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7
