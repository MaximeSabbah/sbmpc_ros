sbmpc_lfc_bridge_node:
  ros__parameters:
    sensor_topic: /sensor
    control_topic: /control
    diagnostics_topic: /sbmpc/diagnostics
    # Keep the publish rate aligned with the hydrax control period
    # (task dt = 0.04 s -> 25 Hz).
    publish_rate_hz: 25.0
    # THE mode switch of the hydrax controller (user decision 2026-07-06:
    # set here, not by a launch argument): exact_feedback publishes the
    # solve's F-MPPI gains anchored at x0 (tau = tau_ff + K (x - x0));
    # feedforward publishes the constant joint impedance anchored on the
    # plan reference. Remember: launch reads this file from the ros2_ws
    # INSTALL space — rebuild sbmpc_bringup after editing.
    planner_mode: exact_feedback
    # Which hydrax task/tuning surface the adapter loads (set here like
    # planner_mode, not by a launch argument; rebuild after editing):
    #   pregrasp   -> hydrax/configs/pregrasp.yaml   (V-B4-certified reach)
    #   pick_place -> hydrax/configs/pick_place.yaml (P2-certified sequence;
    #                 the planner phase machine also drives the gripper
    #                 through the bridge's GripperCommand action client)
    planner_ocp: pick_place
    # Gripper action goal values (actuator/deployment wiring, like the
    # controller yaml's max_effort — NOT task tuning). The action NAME is
    # backend-dependent and injected by the launch. Defaults shown are the
    # bridge defaults, certified in sim (P-A2/P-A3): close overdrives to 0
    # so the effort controller squeezes (it succeeds by stalling on the
    # cube); the real close width is set during the P-B4 staging.
    gripper_close_position: 0.0
    gripper_open_position: 0.04
    gripper_max_effort: 40.0
    gripper_action_timeout_sec: 10.0
    planner_warmup_iterations: 3
    # Transport and deployment wiring ONLY. The OCP tuning (cost weights,
    # solver knobs, plan timing) lives exclusively in hydrax's single
    # tuning surface: hydrax/configs/pregrasp.yaml — the same file the
    # Tier A gates certify. Nothing here can override it.
    #
    # Rollout markers are toggled by the launch arg publish_rollout_markers:=true
    # (RViz MPPI debug); the keys below only style them when enabled. hydrax
    # already traces the gripper path of every rollout, so capture is free.
    rollout_marker_topic: /sbmpc/trajectory_markers
    rollout_marker_frame_id: base
    # Draw the zero-noise nominal plus the lowest-cost sampled rollouts.
    rollout_marker_max_samples: 16
    rollout_marker_publish_rate_hz: 5.0
    rollout_marker_line_width: 0.01
    rollout_marker_sample_line_width: 0.004
    rollout_marker_point_diameter: 0.025
    rollout_marker_goal_diameter: 0.045
    joint_names:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7
