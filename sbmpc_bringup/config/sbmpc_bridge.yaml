sbmpc_lfc_bridge_node:
  ros__parameters:
    sensor_topic: /sensor
    control_topic: /control
    diagnostics_topic: /sbmpc/diagnostics
    publish_rate_hz: 50.0
    planner_deadline_sec: 0.02
    enable_nonzero_control: false
    force_zero_control: false
    allow_joint_reordering: false
    retime_control_initial_state: true
    control_initial_state_prediction_sec: 0.0
    planner_mode: exact_async_feedback
    planner_phase: PREGRASP
    planner_num_steps: 1
    planner_num_samples: 1024
    planner_horizon: 8
    planner_num_control_points: 8
    planner_temperature: 0.05
    planner_dt: 0.02
    planner_noise_scale: 0.05
    planner_smoothing: Spline
    planner_gain_samples_per_cycle: 128
    planner_gain_buffer_size: 512
    joint_names:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7
