sbmpc_lfc_bridge_node:
  ros__parameters:
    sensor_topic: /sensor
    control_topic: /control
    diagnostics_topic: /sbmpc/diagnostics
    # Keep the publish rate aligned with the OCP yaml's mpc.dt (0.04 s -> 25 Hz).
    publish_rate_hz: 25.0
    planner_mode: exact_feedback # exact_feedback or feedforward
    # Optional feedforward-mode-only diagonal LFC helper around the planner's
    # current trajectory reference. Keep disabled by default so feedforward
    # audits measure the native MPC torque, not an added tracking controller.
    feedforward_position_gain: 0.0
    feedforward_velocity_damping_gain: 0.0
    planner_num_steps: 1
    planner_warmup_iterations: 3
    # Rollout markers are toggled by the launch arg publish_rollout_markers:=true
    # (RViz MPPI debug); the keys below only style them when enabled.
    rollout_marker_topic: /sbmpc/trajectory_markers
    rollout_marker_frame_id: base
    # Draw sample 0 plus the lowest-cost sampled MPPI rollouts, not all 1024.
    rollout_marker_max_samples: 16
    rollout_marker_publish_rate_hz: 5.0
    rollout_marker_line_width: 0.01
    rollout_marker_sample_line_width: 0.004
    rollout_marker_point_diameter: 0.025
    rollout_marker_goal_diameter: 0.045
    # Single source of truth for the MPPI knobs (horizon, samples, dt, lambda,
    # smoothing, top-K gain samples) and the cost weights:
    # sbmpc/sbmpc/ocp_configs/<planner_ocp>.yaml.
    planner_ocp: pregrasp
    joint_names:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7
